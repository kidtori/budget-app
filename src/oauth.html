<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Returning to Budget</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1d23;
    }
    main {
      width: min(420px, 100%);
      background: #fff;
      border: 1px solid #e2e6ea;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    p {
      margin: 0;
      color: #4a5568;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Returning to Budget</h1>
    <p>You can close this tab if the app does not reopen automatically.</p>
  </main>
  <script>
    const hash = new URLSearchParams(location.hash.replace(/^#/, ''));
    const query = new URLSearchParams(location.search.replace(/^\?/, ''));
    const params = hash.toString() ? hash : query;
    if (params.toString()) {
      location.replace(`com.kidtori.budget://oauth?${params.toString()}`);
    }
  </script>
</body>
</html>
